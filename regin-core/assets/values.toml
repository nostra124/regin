# regin Soul value catalog (FEAT-030 / DISC-018).
#
# A curated set of prominent values/virtues drawn broadly across human
# traditions so the catalog is not parochial. Each entry: id (stable,
# snake_case), name, one-line canonical description, tradition tag.
#
# Bump `version` whenever entries are added/removed/renamed — charter seeds
# already written to identity.db reference an `id`, not a list position, so
# additive changes are always safe; removing/renaming an id is not (existing
# charters would reference a dangling id).
version = "1"

[[value]]
id = "prudence"
name = "Prudence"
description = "Practical wisdom — judging the right action in a particular situation."
tradition = "cardinal"

