# nfpm recipe (FEAT-053 / DISC-014): one config -> .deb + .rpm + .apk.
# Build with packaging/build.sh, which stamps ${VERSION} from Cargo.toml,
# (re)generates the man pages, and runs nfpm once per format. Supersedes the
# deb-only FEAT-020 staging tree (pkg/).
#
# FEAT-087 scope note: the packaged `regind` binary below is the standard
# musl static-pie build (`packaging/build.sh`'s whole point — one binary
# runs on glibc AND musl/Alpine) and is therefore built WITHOUT the `webui`
# Cargo feature. PAM fundamentally can't work from a static-pie binary:
# `libpam` itself `dlopen()`s host-specific modules (`pam_unix.so` etc.) at
# runtime, which requires a real dynamic linker — not something a static
# binary has. A `webui`-enabled `regind` needs a separate, ordinarily
# dynamically-linked build (`cargo build -p regind --features webui`, see
# `profile.md` §3) on a glibc host; packaging that as a distinct artifact is
# follow-up work, not done here. The `/etc/pam.d/regin` service file below
# is still shipped unconditionally — it's inert (nothing reads it) unless a
# webui-enabled `regind` is installed some other way, and it's one less
# manual step for anyone who does.
name: "regin"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "admin"
priority: "optional"
maintainer: "regin maintainers"
description: |
  LLM-backed autonomous operator for a Linux/UNIX machine.
  Keeps the system at its declared to-be state with ITIL discipline
  (incidents -> changes -> problems), monitoring, and guarded remediation.
vendor: "regin"
homepage: "https://github.com/nostra124/regin"
license: "MIT"

contents:
  # binaries (musl static-pie: one build runs on glibc and musl/Alpine)
  - src: ./target/x86_64-unknown-linux-musl/release/regin
    dst: /usr/bin/regin
  - src: ./target/x86_64-unknown-linux-musl/release/regind
    dst: /usr/bin/regind

  # man pages (generated from the clap surface, FEAT-019)
  - src: ./man/regin.1
    dst: /usr/share/man/man1/regin.1
  - src: ./man/regind.1
    dst: /usr/share/man/man1/regind.1
  - src: ./man/regin-*.1
    dst: /usr/share/man/man1/

  # operator-skills package (FEAT-046) + to-be-state + notice filters
  - src: ./assets/operator-skills/
    dst: /usr/share/regin/operator-skills/
  - src: ./assets/desired/
    dst: /usr/share/regin/desired/
  - src: ./assets/filters/
    dst: /usr/share/regin/filters/

  # installer (FEAT-056), shipped for reference
  - src: ./assets/install.sh
    dst: /usr/share/regin/install.sh
    file_info:
      mode: 0755

  # PAM service file for the web UI (FEAT-087, acceptance criterion 12) —
  # inert unless a webui-enabled regind is installed (see the note above).
  - src: ./assets/pam.d/regin
    dst: /etc/pam.d/regin
    type: config|noreplace

overrides:
  rpm:
    depends: []
  deb:
    depends: []
  apk:
    depends: []
